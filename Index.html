<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cartaz PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  display: flex;
  font-family: Arial;
  background: #ddd;
}

/* MENU */
.sidebar {
  width: 270px;
  background: #222;
  color: white;
  padding: 15px;
  height: 100vh;
  box-sizing: border-box;
}

.sidebar h3 {
  text-align: center;
  margin-top: 0;
}

.sidebar input,
.sidebar select {
  width: 100%;
  padding: 8px;
  margin-bottom: 8px;
  border: none;
  border-radius: 4px;
  box-sizing: border-box;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  font-weight: bold;
  border: none;
  background: #ffcc00;
  cursor: pointer;
}

/* CONTADOR */
#contadorBox {
  background: #111;
  padding: 10px;
  text-align: center;
  margin-bottom: 10px;
  border-radius: 6px;
}

/* PREVIEW */
.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

#cartaz {
  width: 794px;
  height: 1122px;
  background: white;
  border: 5px solid black;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  box-sizing: border-box;
  padding: 10px;
}

/* TIPOS */
.tipo {
  background: red;
  color: white;
  font-family: 'Anton';
  font-size: 50px;
  text-align: center;
  padding: 5px;
}

/* CENTRALIZAÇÃO CORRIGIDA */
.loja,
.produto,
.footer {
  width: 100%;
  display: flex;
  justify-content: center;
  text-align: center;
  
}

.loja {
  font-family: 'Oswald';
  font-size: 30px;
margin-top: -200px;
}

.produto {
  font-family: 'Oswald';
  font-size: 40px;
  font-weight: bold;
  padding: 10px;
}

/* PREÇO */
.preco-area {
  background: yellow;
  margin: 10px;
  padding: 10px;
  display: flex;
  justify-content: center;
}

.preco {
  font-family: 'Anton';
  color: red;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 5px;
}

.valor {
  font-size: 150px;
}

.centavos {
  font-size: 50px;
  margin-top: 40px;
}

/* RODAPÉ */
.footer {
  font-size: 18px;
}
</style>

</head>

<body>

<div class="sidebar">

  <h3>Cartaz PRO</h3>

  <div id="contadorBox">
    Cartazes: <span id="contador">0</span>
  </div>

  <select id="tipo">
    <option>OFERTA</option>
    <option>PROMOÇÃO</option>
    <option>IMPERDÍVEL</option>
    <option>LIQUIDAÇÃO</option>
  </select>

  <input id="lojaInput" placeholder="Nome da loja">
  <input id="codigo" placeholder="Código do produto">
  <input id="produtoInput" placeholder="Produto">
  <input id="precoInput" placeholder="Preço (ex: 6,99)">
  <input id="data" type="date">

  <select id="tamanho">
    <option value="A4">A4</option>
    <option value="A5">A5 (2 por folha)</option>
    <option value="A6">A6 (4 por folha)</option>
  </select>

  <button onclick="adicionarCartaz()">Adicionar cartaz</button>
  <button onclick="gerarPDF()">Gerar PDF</button>
  <button onclick="limpar()">Limpar</button>

</div>

<div class="main">
  <div id="cartaz">

    <div class="tipo" id="tipoTxt">OFERTA</div>
    <div class="loja" id="lojaTxt">SUA LOJA</div>

    <div class="produto" id="produtoTxt">PRODUTO</div>

    <div class="preco-area">
      <div class="preco">
        <div class="valor" id="valor">0</div>
        <div class="centavos" id="centavos">,00</div>
      </div>
    </div>

    <div class="footer" id="rodape">Validade</div>

  </div>
</div>

<script>
const produtosDB = {
  "1632": { nome: "BANANA PRATA", preco: "2,90" },
  "102": { nome: "FEIJÃO CARIOKA 1KG", preco: "7,49" },
  "103": { nome: "ÓLEO DE SOJA 900ML", preco: "6,95" }
};

let listaCartazes = [];

document.querySelectorAll("input, select").forEach(el => {
  el.addEventListener("input", atualizar);
});

document.getElementById("codigo").addEventListener("input", () => {
  const cod = document.getElementById("codigo").value;

  for (let k in produtosDB) {
    if (k.startsWith(cod)) {
      document.getElementById("produtoInput").value = produtosDB[k].nome;
      document.getElementById("precoInput").value = produtosDB[k].preco;
    }
  }

  atualizar();
});

function atualizar() {
  document.getElementById("tipoTxt").innerText =
    document.getElementById("tipo").value;

  document.getElementById("lojaTxt").innerText =
    document.getElementById("lojaInput").value || "SUA LOJA";

  document.getElementById("produtoTxt").innerText =
    document.getElementById("produtoInput").value || "PRODUTO";

  let preco = document.getElementById("precoInput").value.replace(".", ",");

  if (!preco.includes(",")) preco += ",00";

  let p = preco.split(",");

  document.getElementById("valor").innerText = p[0];
  document.getElementById("centavos").innerText = "," + (p[1] || "00");

  document.getElementById("rodape").innerText =
    "Válido até: " + (document.getElementById("data").value || "--/--/----");
}

function atualizarContador() {
  document.getElementById("contador").innerText = listaCartazes.length;
}

function adicionarCartaz() {
  listaCartazes.push({
    tipo: tipo.value,
    loja: lojaInput.value || "SUA LOJA",
    produto: produtoInput.value || "PRODUTO",
    preco: precoInput.value || "0,00",
    data: data.value || "--/--/----"
  });

  atualizarContador();
}

function criarCartaz(dados) {
  const base = document.getElementById("cartaz");
  const clone = base.cloneNode(true);

  let p = dados.preco.replace(".", ",").split(",");

  clone.querySelector("#tipoTxt").innerText = dados.tipo;
  clone.querySelector("#lojaTxt").innerText = dados.loja;
  clone.querySelector("#produtoTxt").innerText = dados.produto;
  clone.querySelector("#valor").innerText = p[0];
  clone.querySelector("#centavos").innerText = "," + (p[1] || "00");
  clone.querySelector("#rodape").innerText = "Válido até: " + dados.data;

  return clone;
}

async function gerarPDF() {
  const { jsPDF } = window.jspdf;

  if (listaCartazes.length === 0)
    return alert("Adicione cartazes");

  const tipo = document.getElementById("tamanho").value;
  const pdf = new jsPDF("p", "mm", "a4");

  let pos;

  if (tipo === "A4") pos = [{x:0,y:0,w:210,h:297}];

  if (tipo === "A5") pos = [
    {x:0,y:0,w:210,h:148},
    {x:0,y:148,w:210,h:148}
  ];

  if (tipo === "A6") pos = [
    {x:0,y:0,w:105,h:148},{x:105,y:0,w:105,h:148},
    {x:0,y:148,w:105,h:148},{x:105,y:148,w:105,h:148}
  ];

  let i = 0;

  while (i < listaCartazes.length) {

    for (let p of pos) {

      if (i >= listaCartazes.length) break;

      const temp = criarCartaz(listaCartazes[i]);
      document.body.appendChild(temp);

      const canvas = await html2canvas(temp, {
        scale: 3,
        backgroundColor: "#fff",
        useCORS: true
      });

      const img = canvas.toDataURL("image/jpeg", 1.0);

      pdf.addImage(img, "JPEG", p.x, p.y, p.w, p.h);

      document.body.removeChild(temp);

      i++;
    }

    if (i < listaCartazes.length)
      pdf.addPage();
  }

  pdf.save("cartazes.pdf");
}

function limpar() {
  listaCartazes = [];
  atualizarContador();
}

atualizarContador();
atualizar();
</script>

</body>
</html>
